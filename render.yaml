services:
  - type: web
    name: ecofeast-backend
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt && python run.py init_db
    startCommand: gunicorn -w 4 -b 0.0.0.0:$PORT run:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.7
      - key: FLASK_ENV
        value: production
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: ecofeast-db
          property: connectionString
      - key: GOOGLE_MAPS_KEY
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: SESSION_COOKIE_SECURE
        value: "True"

databases:
  - name: ecofeast-db
    databaseName: ecofeast_prod
    user: ecofeast_user
    region: oregon
