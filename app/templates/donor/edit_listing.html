{% extends "base.html" %}

{% block title %}Edit Listing - EXCESSBITE{% endblock %}

{% block content %}
<section class="container" style="margin: 2rem 0;">
    <a href="{{ url_for('donor.dashboard') }}" class="back-btn"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>
    <div class="card" style="max-width: 700px; margin: 0 auto;">
        <h1><i class="fas fa-edit" style="color: var(--primary); margin-right: 0.5rem;"></i> Edit Food Listing</h1>
        
        <form method="POST">
            <div class="form-group">
                <label for="food_type">Food Type</label>
                <input type="text" id="food_type" name="food_type" value="{{ donation.food_type }}">
            </div>
            
            <div class="form-group">
                <label for="description">Description</label>
                <textarea id="description" name="description">{{ donation.description }}</textarea>
            </div>
            
            <div class="grid grid-2">
                <div class="form-group">
                    <label for="quantity">Quantity</label>
                    <input type="number" id="quantity" name="quantity" value="{{ donation.quantity }}" min="1">
                </div>
                
                <div class="form-group">
                    <label for="expiry_time">Expiry Time</label>
                    <input type="datetime-local" id="expiry_time" name="expiry_time" value="{{ donation.expiry_time.strftime('%Y-%m-%dT%H:%M') }}">
                </div>
            </div>
            
            <div class="form-group">
                <label for="pickup_address">Pickup Address</label>
                <textarea id="pickup_address" name="pickup_address">{{ donation.pickup_address }}</textarea>
            </div>
            
            <button type="submit" class="btn btn-primary">Update Listing</button>
            <a href="{{ url_for('donor.dashboard') }}" class="btn btn-outline">Cancel</a>
        </form>
    </div>
</section>
{% endblock %}
