{% extends "base.html" %}

{% block title %}Login - EXCESSBITE{% endblock %}

{% block content %}
<section class="container auth-container" data-aos="fade-up">
    <a href="{{ url_for('main.home') }}" class="back-btn"><i class="fas fa-arrow-left"></i> Back to Home</a>
    <div class="card" style="padding: 2.5rem;">
        <div style="text-align: center; margin-bottom: 0.5rem;">
            <div style="width: 60px; height: 60px; background: var(--gradient-primary); border-radius: 18px; display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem; font-size: 1.5rem; color: white; box-shadow: 0 8px 25px rgba(16,185,129,0.25);">
                <i class="fas fa-sign-in-alt"></i>
            </div>
        </div>
        <h1>Welcome Back</h1>
        <p class="auth-subtitle">Sign in to your EXCESSBITE account</p>
        
        {% if error %}
            <div class="alert alert-danger"><i class="fas fa-exclamation-circle"></i> {{ error }}</div>
        {% endif %}
        
        <form method="POST">
            <div class="form-group">
                <label for="username"><i class="fas fa-user" style="color: var(--primary); margin-right: 0.3rem;"></i> Username</label>
                <input type="text" id="username" name="username" placeholder="Enter your username" required autofocus>
            </div>
            
            <div class="form-group">
                <label for="password"><i class="fas fa-lock" style="color: var(--primary); margin-right: 0.3rem;"></i> Password</label>
                <input type="password" id="password" name="password" placeholder="Enter your password" required>
            </div>
            
            <div class="form-group">
                <label style="display: flex; align-items: center; cursor: pointer; font-weight: 400; font-size: 0.9rem;">
                    <input type="checkbox" name="remember" style="width: 18px; height: 18px; margin-right: 0.5rem;"> Remember me
                </label>
            </div>
            
            <button type="submit" class="btn btn-primary btn-block btn-lg"><i class="fas fa-arrow-right"></i> Sign In</button>
        </form>
        
        <p style="text-align: center; margin-top: 1.5rem; color: var(--text-secondary); font-size: 0.92rem;">
            Don't have an account? <a href="{{ url_for('auth.register') }}" style="color: var(--primary); font-weight: 600; text-decoration: none;">Register here</a>
        </p>
    </div>
</section>
{% endblock %}
