{% extends "base.html" %}

{% block title %}Reports - EXCESSBITE{% endblock %}

{% block content %}
<section class="container" style="margin: 2rem 0;">
    <div class="dashboard">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div style="font-weight: bold; margin-bottom: 1rem;"><i class="fas fa-shield-alt" style="color: var(--primary);"></i> Admin Menu</div>
            <div class="sidebar-item"><a href="{{ url_for('admin.dashboard') }}"><i class="fas fa-tachometer-alt"></i> Dashboard</a></div>
            <div class="sidebar-item"><a href="{{ url_for('admin.manage_users') }}"><i class="fas fa-users"></i> Manage Users</a></div>
            <div class="sidebar-item"><a href="{{ url_for('admin.manage_donations') }}"><i class="fas fa-gift"></i> Manage Donations</a></div>
            <div class="sidebar-item"><a href="{{ url_for('admin.manage_requests') }}"><i class="fas fa-clipboard-list"></i> Manage Requests</a></div>
            <div class="sidebar-item active"><a href=""><i class="fas fa-chart-bar"></i> Reports</a></div>
        </aside>
        
        <!-- Main Content -->
        <div class="main-content">
            <h1><i class="fas fa-chart-bar" style="color: var(--primary); margin-right: 0.5rem;"></i> Reports</h1>
            
            <!-- Daily Donations Chart -->
            <div class="card" style="margin-bottom: 2rem;">
                <h2><i class="fas fa-chart-line" style="color: var(--accent); margin-right: 0.5rem;"></i> Daily Donations (Last 30 Days)</h2>
                <canvas id="dailyChart"></canvas>
            </div>
            
            <!-- NGO Distribution Chart -->
            <div class="card">
                <h2><i class="fas fa-chart-pie" style="color: var(--secondary); margin-right: 0.5rem;"></i> Food Distribution by NGO</h2>
                <canvas id="ngoChart"></canvas>
            </div>
        </div>
    </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        // Daily donations chart
        const dailyCtx = document.getElementById('dailyChart').getContext('2d');
        new Chart(dailyCtx, {
            type: 'line',
            data: {
                labels: [{% for date, count in daily_donations %}'{{ date }}'{{ "," if not loop.last }}{% endfor %}],
                datasets: [{
                    label: 'Donations',
                    data: [{% for date, count in daily_donations %}{{ count }}{{ "," if not loop.last }}{% endfor %}],
                    borderColor: '#10b981',
                    backgroundColor: 'rgba(16, 185, 129, 0.1)',
                    tension: 0.4
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: { display: true }
                },
                scales: {
                    y: { beginAtZero: true }
                }
            }
        });
        
        // NGO distribution chart
        const ngoCtx = document.getElementById('ngoChart').getContext('2d');
        new Chart(ngoCtx, {
            type: 'bar',
            data: {
                labels: [{% for ngo, count in ngo_distributions %}'{{ ngo }}'{{ "," if not loop.last }}{% endfor %}],
                datasets: [{
                    label: 'Deliveries',
                    data: [{% for ngo, count in ngo_distributions %}{{ count }}{{ "," if not loop.last }}{% endfor %}],
                    backgroundColor: '#10b981'
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: { display: false }
                },
                scales: {
                    y: { beginAtZero: true }
                }
            }
        });
    });
</script>
{% endblock %}
